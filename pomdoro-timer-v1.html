
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pomodoro Timer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #f8f8f8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .pomo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 1.25rem;
    background: #f8f8f8;
    border-radius: 16px;
    width: fit-content;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  .input-field {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .input-field label {
    font-size: 10px;
    color: #8a8a8a;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .input-field input {
    width: 42px;
    text-align: center;
    font-size: 14px;
    padding: 4px 2px;
    border-radius: 8px;
    border: 1.5px solid #cfcfcf;
    background: #ffffff;
    color: #2b2b2b;
  }

  .input-field input:focus {
    outline: none;
    border-color: #9ab89a;
  }

  .pomo-image {
    width: 113px;
    height: 129px;
    border-radius: 10px;
    margin-top: 4px;
    object-fit: cover;
  }

  .phase-label {
    font-size: 11px;
    color: #8a8a8a;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .timer-display {
    font-size: 30px;
    font-weight: 600;
    color: #2b2b2b;
    font-variant-numeric: tabular-nums;
  }

  .round-dots {
    display: flex;
    gap: 8px;
    margin-top: -4px;
  }

  .round-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #d0d0d0;
    cursor: pointer;
    border: none;
    padding: 0;
    transition: transform 0.15s ease, background 0.2s ease;
  }

  .round-dot:hover {
    transform: scale(1.25);
  }

  .round-dot:active {
    transform: scale(0.9);
  }

  .round-dot.done {
    background: #8ba888;
  }

  .round-dot.current {
    background: #6b6b6b;
  }

  .ctrl-row {
    display: flex;
    gap: 10px;
    margin-top: 2px;
  }

  .ctrl-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid #cfcfcf;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #6b6b6b;
    transition: transform 0.15s ease;
  }

  .ctrl-btn:hover {
    transform: scale(1.06);
  }

  .ctrl-btn:active {
    transform: scale(0.94);
  }

  .ctrl-btn svg {
    width: 14px;
    height: 14px;
  }
</style>
</head>
<body>

<div class="pomo-wrap">
  <div class="input-row">
    <div class="input-field">
      <label for="work-input">Work</label>
      <input type="number" id="work-input" min="1" value="25">
    </div>
    <div class="input-field">
      <label for="break-input">Break</label>
      <input type="number" id="break-input" min="1" value="5">
    </div>
    <div class="input-field">
      <label for="long-input">Long Break</label>
      <input type="number" id="long-input" min="1" value="30">
    </div>
  </div>

  <img class="pomo-image" src="pomdoro-main.png" alt="">

  <div class="phase-label" id="phase-label">Work</div>
  <div class="timer-display" id="timer-display">25:00</div>
  <div class="round-dots" id="round-dots"></div>

  <div class="ctrl-row">
    <button class="ctrl-btn" id="pause-btn" aria-label="Start">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
    </button>
    <button class="ctrl-btn" id="stop-btn" aria-label="Stop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14"></rect></svg>
    </button>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'pomodoro-cycle-state';
  const ROUNDS_PER_CYCLE = 4;

  const workInput = document.getElementById('work-input');
  const breakInput = document.getElementById('break-input');
  const longInput = document.getElementById('long-input');
  const timerDisplay = document.getElementById('timer-display');
  const phaseLabel = document.getElementById('phase-label');
  const roundDotsEl = document.getElementById('round-dots');
  const pauseBtn = document.getElementById('pause-btn');
  const stopBtn = document.getElementById('stop-btn');

  const playIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>';
  const pauseIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';

  // phase: 'work' or 'break' (break is short unless roundNum === ROUNDS_PER_CYCLE, then it's long)
  let phase = 'work';
  let roundNum = 1; // 1-4, which round of the current cycle we're on
  let endTime = null;
  let remainingMs = null;
  let isRunning = false;
  let isPaused = false;
  let intervalId = null;

  function getMinutes(inputEl, fallback) {
    const v = parseInt(inputEl.value, 10);
    return (isNaN(v) || v <= 0) ? fallback : v;
  }

  function isLongBreakRound() {
    return roundNum >= ROUNDS_PER_CYCLE;
  }

  function currentDuration() {
    if (phase === 'work') return getMinutes(workInput, 25) * 60;
    if (phase === 'break') {
      return isLongBreakRound() ? getMinutes(longInput, 30) * 60 : getMinutes(breakInput, 5) * 60;
    }
    return getMinutes(workInput, 25) * 60;
  }

  function phaseLabelText() {
    if (phase === 'work') return 'Work';
    return isLongBreakRound() ? 'Long Break' : 'Break';
  }

  function renderDots() {
    roundDotsEl.innerHTML = '';
    for (let i = 0; i < ROUNDS_PER_CYCLE; i++) {
      const dot = document.createElement('button');
      let cls = 'round-dot';
      const dotRound = i + 1;
      if (dotRound < roundNum) cls += ' done';
      else if (dotRound === roundNum) cls += ' current';
      dot.className = cls;
      dot.setAttribute('aria-label', 'Go to Work round ' + dotRound);
      dot.addEventListener('click', function() { goToRound(dotRound); });
      roundDotsEl.appendChild(dot);
    }
  }

  function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  function updateDisplayIdle() {
    timerDisplay.textContent = formatTime(currentDuration());
    phaseLabel.textContent = phaseLabelText();
    renderDots();
  }

  function goToRound(r) {
    clearInterval(intervalId);
    intervalId = null;
    endTime = null;
    remainingMs = null;
    isRunning = false;
    isPaused = false;
    roundNum = r;
    phase = 'work';
    pauseBtn.innerHTML = playIcon;
    updateDisplayIdle();
    saveState();
  }

  function playChime() {
    const audio = new Audio('pomdoro-timer.mp3');
    audio.play().catch(function(e) {});
  }

  function advancePhase() {
    if (phase === 'work') {
      phase = 'break';
    } else {
      if (isLongBreakRound()) {
        roundNum = 1;
      } else {
        roundNum += 1;
      }
      phase = 'work';
    }
  }

  function tick() {
    const remaining = Math.round((endTime - Date.now()) / 1000);
    if (remaining <= 0) {
      playChime();
      advancePhase();
      updateDisplayIdle();
      startPhaseTimer();
      return;
    }
    timerDisplay.textContent = formatTime(remaining);
  }

  function startPhaseTimer() {
    endTime = Date.now() + currentDuration() * 1000;
    remainingMs = null;
    isRunning = true;
    isPaused = false;
    pauseBtn.innerHTML = pauseIcon;
    saveState();
    if (intervalId) clearInterval(intervalId);
    tick();
    intervalId = setInterval(tick, 1000);
  }

  function togglePause() {
    if (!isRunning && !isPaused) {
      startPhaseTimer();
      return;
    }
    if (isPaused) {
      endTime = Date.now() + remainingMs;
      remainingMs = null;
      isPaused = false;
      isRunning = true;
      pauseBtn.innerHTML = pauseIcon;
      tick();
      intervalId = setInterval(tick, 1000);
    } else {
      remainingMs = endTime - Date.now();
      endTime = null;
      isPaused = true;
      isRunning = false;
      clearInterval(intervalId);
      intervalId = null;
      pauseBtn.innerHTML = playIcon;
    }
    saveState();
  }

  function stopTimer() {
    clearInterval(intervalId);
    intervalId = null;
    endTime = null;
    remainingMs = null;
    isRunning = false;
    isPaused = false;
    phase = 'work';
    roundNum = 1;
    pauseBtn.innerHTML = playIcon;
    updateDisplayIdle();
    clearState();
  }

  pauseBtn.addEventListener('click', togglePause);
  stopBtn.addEventListener('click', stopTimer);

  [workInput, breakInput, longInput].forEach(function(inputEl) {
    inputEl.addEventListener('change', function() {
      saveState();
      if (!isRunning && !isPaused) {
        updateDisplayIdle();
      }
    });
  });

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        work: workInput.value, brk: breakInput.value, long: longInput.value,
        phase: phase, roundNum: roundNum,
        endTime: endTime, remainingMs: remainingMs, isPaused: isPaused
      }));
    } catch (e) {}
  }

  function clearState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          work: p.work, brk: p.brk, long: p.long,
          phase: 'work', roundNum: 1, endTime: null, remainingMs: null, isPaused: false
        }));
      }
    } catch (e) {}
  }

  function resume() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (p.work) workInput.value = p.work;
        if (p.brk) breakInput.value = p.brk;
        if (p.long) longInput.value = p.long;
        phase = p.phase || 'work';
        roundNum = p.roundNum || 1;
        if (p.isPaused && p.remainingMs) {
          remainingMs = p.remainingMs;
          isPaused = true;
          pauseBtn.innerHTML = playIcon;
          phaseLabel.textContent = phaseLabelText();
          timerDisplay.textContent = formatTime(Math.round(remainingMs / 1000));
          renderDots();
        } else if (p.endTime && p.endTime > Date.now()) {
          endTime = p.endTime;
          isRunning = true;
          pauseBtn.innerHTML = pauseIcon;
          phaseLabel.textContent = phaseLabelText();
          renderDots();
          tick();
          intervalId = setInterval(tick, 1000);
        } else {
          updateDisplayIdle();
        }
      } else {
        updateDisplayIdle();
      }
    } catch (e) {
      updateDisplayIdle();
    }
  }

  resume();
})();
</script>

</body>
</html>
