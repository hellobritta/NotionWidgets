
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clock & Calendar Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: #ffffff;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .widget {
    position: relative;
    width: 260px;
    height: 145px;
  }

  .widget img {
    position: absolute;
    top: 0;
    left: 0;
    display: block;
    width: 100%;
    height: 100%;
    user-select: none;
    pointer-events: none;
  }

  .calendar-img {
    z-index: 1;
  }

  .clock-img {
    z-index: 3;
  }

  .calendar-text-layer {
    position: absolute;
    inset: 0;
    z-index: 2;
    transform: rotate(9deg);
    transform-origin: 31% 20%;
  }

  .cal-month {
    position: absolute;
    left: 16%;
    top: 18%;
    width: 34%;
    text-align: center;
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: 1px;
    color: #9a9f73;
  }

  .cal-date {
    position: absolute;
    left: 7%;
    top: 30%;
    width: 48%;
    text-align: center;
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 50px;
    line-height: 1;
    color: #9a9f73;
  }

  .clock-time {
    position: absolute;
    z-index: 4;
    left: 36.7%;
    top: 47.6%;
    width: 39.8%;
    height: 34.9%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    letter-spacing: 0.5px;
    color: #fef4d7;
    transform: rotate(4deg) scaleY(1.8);
  }
</style>
</head>
<body>

<div class="widget">
  <img class="calendar-img" src="calendar.png" alt="Notepad calendar">

  <div class="calendar-text-layer">
    <div class="cal-month" id="cal-month">JUL</div>
    <div class="cal-date" id="cal-date">17</div>
  </div>

  <img class="clock-img" src="analog-clock.png" alt="Digital clock box">

  <div class="clock-time" id="clock-time">00:00:00</div>
</div>

<script>
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  function pad(n) {
    return n.toString().padStart(2, '0');
  }

  function update() {
    const now = new Date();
    document.getElementById('cal-month').textContent = MONTHS[now.getMonth()];
    document.getElementById('cal-date').textContent = pad(now.getDate());
    document.getElementById('clock-time').textContent =
      pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
