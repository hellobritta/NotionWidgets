<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv='cache-control' content='no-cache'> 
<meta http-equiv='expires' content='0'> 
<meta http-equiv='pragma' content='no-cache'>
<title>World Clock</title>
<style>
body {
  background-color: #ffffff;
  font-family: "SF Pro Display", "Segoe UI", "Avenir";
  margin: 0;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.5;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.clock {
  padding: 10px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
h1 {
  letter-spacing: 1.5px;
  margin: 0;
}
.time {
  color: #b0c8a4;
  font-size: 1.75rem;
  font-weight: 600;
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
}
.date {
  color: #37352f;
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.date svg {
  width: 13px;
  height: 13px;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="clock">
  <h1 class="time">--:--:--</h1>
  <div class="date">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#37352f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span class="date-text"> </span>
  </div>
</div>
</body>
<script>
const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const padLeft = (num) => String(num).padStart(2, "0");
setInterval(function() {
  const today = new Date();
  const hours = today.getHours();
  const minutes = today.getMinutes();
  const seconds = today.getSeconds();
  const day = days[today.getDay()];
  const month = months[today.getMonth()];
  const dateNum = today.getDate();
  document.querySelector(".time").innerHTML =
    padLeft(hours) + ":" + padLeft(minutes) + ":" + padLeft(seconds);
  document.querySelector(".date-text").innerHTML =
    day + ", " + month + " " + padLeft(dateNum);
}, 1000);
</script>
</html>
