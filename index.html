<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv='cache-control' content='no-cache'> 
<meta http-equiv='expires' content='0'> 
<meta http-equiv='pragma' content='no-cache'>
<title>World Clock</title>
<style>
body {
  background-color: #ffffff;
  font-family: "SF Pro Display", "Segoe UI", "Avenir";
  margin: 0;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.5;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.clock {
  padding: 10px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
h1 {
  letter-spacing: 1.5px;
  margin: 0;
}
.time {
  color: #b0c8a4;
  font-size: 1.75rem;
  font-weight: 600;
  letter-spacing: 2px;
}
.date-box {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px solid #37352f;
  border-radius: 10px;
  padding: 10px 5px 10px;
  min-width: 24px;
  gap: 0;
}
.date-num {
  color: #37352f;
  font-size: 1.0rem;
  font-weight: 700;
  line-height: 1.1;
}
.date-label {
  color: #37352f;
  font-size: 0.60rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.3;
}
</style>
</head>
<body>
<div class="clock">
  <div class="date-box">
    <span class="date-num">--</span>
    <span class="date-label">--- ---</span>
  </div>
  <h1 class="time">--:--:--</h1>
</div>
</body>
<script>
const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

const padLeft = (num) => String(num).padStart(2, "0");

setInterval(function() {
  const today = new Date();
  const hours = today.getHours();
  const minutes = today.getMinutes();
  const seconds = today.getSeconds();
  const day = days[today.getDay()];
  const month = months[today.getMonth()];
  const dateNum = today.getDate();

  document.querySelector(".time").innerHTML =
    padLeft(hours) + ":" + padLeft(minutes) + ":" + padLeft(seconds);

  document.querySelector(".date-num").innerHTML = padLeft(dateNum);
  document.querySelector(".date-label").innerHTML = day + " " + month;
}, 1000);
</script>
</html>
