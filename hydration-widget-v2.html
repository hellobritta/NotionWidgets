<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hydration Tracker</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .hydro-wrap {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 16px 12px;
  }

  .hydro-grid {
    display: flex;
    gap: 8px;
  }

  .hydro-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hydro-drop {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    background: none;
    border: none;
    padding: 0;
    transition: transform 0.15s ease;
  }

  .hydro-drop:hover {
    transform: translateY(-2px);
  }

  .hydro-drop:active {
    transform: scale(0.94);
  }

  .hydro-outline {
    fill: none;
    stroke: #8a95a6;
    stroke-width: 2.5;
    transition: stroke 0.25s ease;
  }

  .hydro-fill {
    fill: #378ADD;
    transition: opacity 0.3s ease;
  }

  .hydro-label {
    font-size: 9px;
    color: #9a9a9a;
    user-select: none;
  }

  .hydro-clear {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid #c9bfa8;
    background: #fdfbf6;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.2s ease, transform 0.15s ease;
    margin-left: 8px;
    margin-top: 3px;
    flex-shrink: 0;
  }

  .hydro-clear:hover {
    opacity: 1;
    transform: scale(1.08);
  }

  .hydro-clear:active {
    transform: scale(0.92);
  }
</style>
</head>
<body>

<div class="hydro-wrap">
  <div class="hydro-grid" id="hydro-grid"></div>
  <button class="hydro-clear" id="hydro-clear" aria-label="Clear all drops">
    <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="#9a8f78" stroke-width="2" stroke-linecap="round">
      <path d="M4 4 L20 20 M20 4 L4 20"/>
    </svg>
  </button>
</div>

<script>
(function() {
  const TOTAL = 8;
  const OZ_PER_DROP = 8;
  const SUPABASE_URL = 'https://ytbwnxcpirtmrcvpucqc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_V2VUkJvgu_ZpaWj_uDwHkw_JenFespl';
  const REST_URL = SUPABASE_URL + '/rest/v1/hydration';

  const grid = document.getElementById('hydro-grid');
  const dropPath = "M23 2 C23 2 6 24 6 38 C6 47.4 13.6 55 23 55 C32.4 55 40 47.4 40 38 C40 24 23 2 23 2 Z";
  let level = 0;
  let rowId = null;
  const wraps = [];

  for (let i = 0; i < TOTAL; i++) {
    const item = document.createElement('div');
    item.className = 'hydro-item';

    const btn = document.createElement('button');
    btn.className = 'hydro-drop';
    btn.setAttribute('aria-label', 'Cup ' + (i + 1));
    btn.innerHTML =
      '<svg viewBox="0 0 46 58" width="22" height="28" style="overflow:visible">' +
      '<defs><clipPath id="hydro-clip-' + i + '"><path d="' + dropPath + '"></path></clipPath></defs>' +
      '<rect class="hydro-fill" x="0" y="0" width="46" height="58" clip-path="url(#hydro-clip-' + i + ')" style="opacity:0"></rect>' +
      '<path class="hydro-outline" d="' + dropPath + '"></path>' +
      '</svg>';
    btn.addEventListener('click', function() {
      const clicked = i + 1;
      level = (level === clicked) ? clicked - 1 : clicked;
      render();
      save();
    });

    const label = document.createElement('div');
    label.className = 'hydro-label';
    label.textContent = ((i + 1) * OZ_PER_DROP) + 'oz';

    item.appendChild(btn);
    item.appendChild(label);
    grid.appendChild(item);
    wraps.push(btn);
  }

  document.getElementById('hydro-clear').addEventListener('click', function() {
    level = 0;
    render();
    save();
  });

  function render() {
    wraps.forEach(function(btn, i) {
      const fillEl = btn.querySelector('.hydro-fill');
      fillEl.style.opacity = i < level ? '1' : '0';
    });
  }

  async function save() {
    if (rowId === null) return;
    try {
      await fetch(REST_URL + '?id=eq.' + rowId, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ level: level })
      });
    } catch (e) {
      console.error('Save failed', e);
    }
  }

  async function load() {
    try {
      const res = await fetch(REST_URL + '?select=id,level&order=id.asc&limit=1', {
        headers: {
          'apikey': SUPABASE_KEY
        }
      });
      const data = await res.json();
      if (data && data.length > 0) {
        rowId = data[0].id;
        level = data[0].level || 0;
      }
    } catch (e) {
      console.error('Load failed', e);
    }
    render();
  }

  load();
})();
</script>

</body>
</html>
