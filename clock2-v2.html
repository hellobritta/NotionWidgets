
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clock</title>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  .container {
    background: #b0c8a4;
    border-radius: 18px;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .clock {
    display: flex;
    gap: 14px;
  }

  .digits {
    background: #c7d9bd;
    border-radius: 10px;
    padding: 8px 10px;
    min-width: 50px;
    text-align: center;
  }

  .digits span {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
  }

  .date {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #ffffff;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .date svg {
    width: 11px;
    height: 11px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="clock">
    <div class="digits"><span id="hours">00</span></div>
    <div class="digits"><span id="minutes">00</span></div>
    <div class="digits"><span id="seconds">00</span></div>
  </div>
  <div class="date">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="18" height="18" rx="3" stroke="#ffffff" stroke-width="2"/>
      <path d="M3 9H21" stroke="#ffffff" stroke-width="2"/>
      <path d="M8 2V5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <path d="M16 2V5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span id="date">Loading...</span>
  </div>
</div>

<script>
  function pad(n) {
    return n.toString().padStart(2, '0');
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('hours').textContent = pad(now.getHours());
    document.getElementById('minutes').textContent = pad(now.getMinutes());
    document.getElementById('seconds').textContent = pad(now.getSeconds());

    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
